<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./normalize.css" />
    <link rel="stylesheet" href="./header.css" />
    <link rel="stylesheet" href="./menu.css" />
    <link rel="stylesheet" href="./container.css" />
    <link rel="stylesheet" href="./assignment.css" />
    <link rel="stylesheet" href="./toolbar.css" />
    <link rel="stylesheet" href="./tasks.css" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./footer-controls.css" />
    <title>Document</title>
  </head>/
  <body>
    <header class="header">
      <div class="header__container">
        <h1 class="header__logo">TaskLite</h1>
        <nav class="navigate">
          <ul class="menu">
            <li><a href="#" class="menu__list menu__list--active">To Do</a></li>
            <li><a href="#" class="menu__list">Kanban</a></li>
            <li><a href="#" class="menu__list">Привычки</a></li>
          </ul>
        </nav>
      </div>
    </header>
    <main class="container">
      <section class="assignment">
    
          <h1 class="assignment__title">Задачи</h1>

          <form method="post" class="assignment-entry">
            <input
              type="text"
              class="assignment-entry__input"
              placeholder="Введите задачу"
            />  
            <button type="submit" class="assignment-entry__btn">
              Добавить
            </button>
          </form>


        <div class="toolbar">
          <input
            type="text"
            class="toolbar__search"
            placeholder="Поиск задач..."
          />  
          <div class="tabs toolbar__tabs">
            <button class="tabs__item tabs__item--active">Все</button>
            <button class="tabs__item">Активные</button>
            <button class="tabs__item">Завершенные</button>
          </div>


          <select class="toolbar__sort">
            <option value="new">Сначала новые</option>
            <option value="old">Сначала старые</option>
          </select>

        </div>


        <div class="tasks"></div>


        <div class="footer-controls">
          <div class="footer-controls__counters">
            <span>Всего: 1</span>
            <span>Активных: 1</span>
            <span>Выполненных: 0</span>
          </div>
          <button type="button" class="button--clear footer-controls__clear">
              Очистить выполненные
          </button>
        </div>
      </section>
    </main>
    <footer></footer>
    <script src="./app.js"></script>
  </body>
</html>
